<!DOCTYPE html>
<html>
<head>
  <title>Blob Office Plugin - Test Report</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d14;
      color: #e0e0e0;
      padding: 40px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #fff; margin-bottom: 30px; }
    .summary {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 30px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .stat-card {
      background: #252540;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-value {
      font-size: 36px;
      font-weight: bold;
      color: #4caf50;
    }
    .stat-label {
      color: #888;
      margin-top: 5px;
    }
    .suite {
      background: #1a1a2e;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 15px;
    }
    .suite-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .suite-name { font-size: 18px; font-weight: bold; }
    .suite-stats { color: #888; }
    .test {
      display: flex;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #333;
    }
    .test:last-child { border-bottom: none; }
    .status {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      margin-right: 10px;
    }
    .status.passed { background: #4caf50; }
    .status.failed { background: #f44336; }
    .timestamp {
      color: #666;
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Blob Office Plugin - Test Report</h1>
    
    <div class="summary">
      <div class="suite-header">
        <span>Overall Summary</span>
        <span style="color: #4caf50; font-weight: bold;">100.0% Pass Rate</span>
      </div>
      <div class="stats">
        <div class="stat-card">
          <div class="stat-value">1</div>
          <div class="stat-label">Total Tests</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color: #4caf50;">1</div>
          <div class="stat-label">Passed</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color: #f44336;">0</div>
          <div class="stat-label">Failed</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">0.11s</div>
          <div class="stat-label">Duration</div>
        </div>
      </div>
    </div>

    <h2>Test Suites</h2>
    
    <div class="suite">
      <div class="suite-header">
        <span class="suite-name">UNIT</span>
        <span class="suite-stats">1 passed, 0 failed</span>
      </div>
    </div>
    

    <div class="timestamp">
      Generated: 3/19/2026, 4:39:43 PM
    </div>
  </div>
</body>
</html>
