<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Blob Office — OpenCode</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d14;
      overflow: hidden;
      font-family: monospace;
    }
    canvas { display: block; }

    #status-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 28px;
      background: #111120cc;
      border-top: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 18px;
      font-size: 11px;
      color: #555;
      backdrop-filter: blur(4px);
      z-index: 10;
    }
    #status-bar .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #f00;
      flex-shrink: 0;
    }
    #status-bar .dot.connected { background: #0f0; box-shadow: 0 0 6px #0f04; }
    #status-bar span { color: #667; }
    #status-bar .count { color: #aaa; }

    #no-agents {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #2a2a4a;
      font-size: 13px;
      gap: 10px;
      pointer-events: none;
    }
    #no-agents .big { font-size: 48px; }
    #no-agents.hidden { display: none; }
  </style>
</head>
<body>

<div id="no-agents">
  <div class="big">🏢</div>
  <div>Waiting for OpenCode sessions…</div>
  <div style="font-size:11px;color:#1e1e3a">Start a session in OpenCode to spawn an agent</div>
</div>

<div id="status-bar">
  <div class="dot" id="ws-dot"></div>
  <span id="ws-label">connecting…</span>
  <span style="margin-left:auto" class="count" id="agent-count"></span>
  <span id="ws-url">connecting...</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
// ─── WebSocket Client ─────────────────────────────────────────────────────────

// WS port is injected by the HTTP server at serve-time
const BASE_PORT = (typeof window !== 'undefined' && window.BLOB_OFFICE_WS_PORT) || 2727;
let agents = {};      // id → AgentState
let ws = null;
let connected = false;
let lastSnapshotTime = 0;
let snapshotDebounceTimer = null;
const SNAPSHOT_DEBOUNCE_MS = 50;  // Min time between processing snapshots

// Exponential backoff for reconnection
let reconnectAttempts = 0;
let serverClosed = false;  // True if server sent graceful shutdown
let reconnectTimer = null; // Single reconnect timer — prevents concurrent scheduling
const INITIAL_DELAY = 1000;
const MAX_DELAY = 30000;

const wsDot   = document.getElementById("ws-dot");
const wsLabel = document.getElementById("ws-label");
const wsUrlEl = document.getElementById("ws-url");
const agentCountEl = document.getElementById("agent-count");
const noAgents = document.getElementById("no-agents");

function scheduleReconnect(delay) {
  if (reconnectTimer) return; // Already scheduled — don't pile up
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    connectWS();
  }, delay);
}

function connectWS() {
  const wsUrl = `ws://localhost:${BASE_PORT}/ws`;
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    connected = true;
    reconnectAttempts = 0;
    serverClosed = false;
    wsDot.className = "dot connected";
    wsLabel.textContent = `connected :${BASE_PORT}`;
    wsUrlEl.textContent = wsUrl;

    // Clear any stale fading-out agents from a previous disconnect
    // The next snapshot from the server will repopulate fresh state
    for (const id in agents) {
      if (agents[id]._fadeOutStart) {
        removeAgentPosition(id);
        delete agents[id];
      }
    }
  };

  ws.onclose = (event) => {
    connected = false;
    wsDot.className = "dot";

    if (serverClosed) {
      // Graceful shutdown — blobs are already fading out, don't wipe them
      // Don't reconnect; the page will close after fade completes
      wsLabel.textContent = "server closed";
      wsUrlEl.textContent = "closing…";
      return;
    }

    // Unexpected disconnect — fade out all blobs, then reconnect
    const now = Date.now();
    const hadAgents = Object.keys(agents).length > 0;
    for (const id in agents) {
      if (!agents[id]._fadeOutStart) {
        agents[id]._fadeOutStart = now;
      }
    }

    wsLabel.textContent = "disconnected";

    if (reconnectAttempts === 0 && hadAgents) {
      // First disconnect — give blobs time to fade out, then try reconnecting
      wsUrlEl.textContent = "reconnecting soon…";
      scheduleReconnect(2000);
    } else {
      // Subsequent failed reconnect attempts — exponential backoff
      const delay = Math.min(INITIAL_DELAY * Math.pow(2, reconnectAttempts), MAX_DELAY);
      wsUrlEl.textContent = `retry in ${Math.round(delay / 1000)}s`;
      scheduleReconnect(delay);
    }
    reconnectAttempts++;
  };

  ws.onerror = () => {
    // onerror is always followed by onclose — let onclose handle reconnect
  };

  ws.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      if (msg.type === "snapshot") {
        // Debounce rapid snapshot updates
        const now = Date.now();
        if (now - lastSnapshotTime < SNAPSHOT_DEBOUNCE_MS) {
          // Clear existing timer and set new one
          if (snapshotDebounceTimer) clearTimeout(snapshotDebounceTimer);
          snapshotDebounceTimer = setTimeout(() => {
            processSnapshot(msg.agents);
          }, SNAPSHOT_DEBOUNCE_MS);
          return;
        }
        lastSnapshotTime = now;
        processSnapshot(msg.agents);
      } else if (msg.type === "serverclosing") {
        // Server is shutting down gracefully — fizzle all blobs then close the page
        serverClosed = true;
        connected = false;
        wsDot.className = "dot";
        wsLabel.textContent = "server closed";

        // Start fade-out on all remaining agents
        const now = Date.now();
        for (const id in agents) {
          if (!agents[id]._fadeOutStart) {
            agents[id]._fadeOutStart = now;
          }
        }

        // After fade completes, close the tab (if we're the only viewer)
        setTimeout(() => {
          // Only close if no agents remain (i.e. nobody reconnected)
          const remaining = Object.values(agents).filter(a => !a._fadeOutStart);
          if (remaining.length === 0) {
            window.close();
          }
        }, 1500);

        if (ws) ws.close();
      }
    } catch { /* ignore */ }
  };

  function processSnapshot(msgAgents) {
    // Merge new state, preserve visual positions from existing sprites
    const next = {};
    const now = Date.now();

    for (const a of msgAgents) {
      next[a.id] = { ...a };
    }

    // Carry over any client-side visual data and track disappearing agents
    for (const id in agents) {
      if (next[id]) {
        // Agent still exists - carry over sprite and preserve position
        if (agents[id]._sprite) {
          next[id]._sprite = agents[id]._sprite;
          // Update sprite hue in case it changed
          next[id]._sprite.hue = next[id].color;
        }
      } else {
        // Agent was removed - keep it briefly for fade-out effect
        const removedAgent = agents[id];
        if (removedAgent._sprite && !removedAgent._fadeOutStart) {
          removedAgent._fadeOutStart = now;
          next[id] = removedAgent;
        }
        // Also clean up position tracking
        removeAgentPosition(id);
      }
    }

    // Remove agents that have been fading out for more than 1 second
    for (const id in next) {
      if (next[id]._fadeOutStart && now - next[id]._fadeOutStart > 1000) {
        delete next[id];
        removeAgentPosition(id);
      }
    }

    // Clean up stale position assignments (agents that no longer exist and TTL expired)
    positionAssignments = positionAssignments.filter(id => {
      return id in agentPositions || positionSlotTTL.has(id);
    });

    agents = next;

    const allAgents = Object.values(agents);
    const mainCount = allAgents.filter(a => !a.parentID).length;
    const subCount = allAgents.filter(a => a.parentID).length;

    let countText = mainCount === 0 ? "" : `${mainCount} agent${mainCount !== 1 ? "s" : ""}`;
    if (subCount > 0) {
      countText += ` + ${subCount} subagent${subCount !== 1 ? "s" : ""}`;
    }
    agentCountEl.textContent = countText;
    noAgents.classList.toggle("hidden", allAgents.length > 0);
  }
}

connectWS();

// ─── p5.js Sketch ─────────────────────────────────────────────────────────────

const FLOOR_COLOR   = [15, 15, 25];
const GRID_COLOR    = [22, 22, 38];
const GRID_SIZE     = 48;

// Zoom scale factor (1.3 = 30% larger)
const ZOOM = 1.3;

// Status → animation config
const STATUS_CFG = {
  idle:     { pulse: 0.4, radius: 28, opacity: 160, label: "💤", ring: false },
  thinking: { pulse: 1.8, radius: 34, opacity: 230, label: "🧠", ring: true  },
  editing:  { pulse: 1.2, radius: 31, opacity: 255, label: "✏️", ring: true  },
  reading:  { pulse: 1.2, radius: 32, opacity: 210, label: "📖", ring: true  },
  running:  { pulse: 3.0, radius: 35, opacity: 245, label: "💻", ring: true  },
  waiting:  { pulse: 0.8, radius: 31, opacity: 200, label: "⚠️", ring: true  },
  error:    { pulse: 1.5, radius: 31, opacity: 255, label: "❌", ring: true  },
};

// Magnetic repulsion - prevents blobs from stacking on top of each other
const REPULSION_STRENGTH = 0.15;  // Force multiplier
const REPULSION_FALLOFF = 2;       // Inverse square falloff

// ── Radial positioning ─────────────────────────────────────────────────────

// Track agent positions for radial layout - with stability buffer
const agentPositions = {};  // agentId → index
let positionAssignments = [];  // track order for consistent angles
const positionSlotTTL = new Map();  // agentId → timestamp when slot expires

function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function calculateRadialPos(agentIndex, totalAgents, W, H) {
  // Center of canvas (accounting for status bar)
  const centerX = W/ 2;
  const centerY = (H - 30) / 2;

  // Base radius - closer to center with fewer agents (scaled by zoom)
  const minRadius = 60 * ZOOM;
  const radiusPerAgent = 58 * ZOOM;
  const maxRadius = Math.min(W, H - 30) / 2 - 50;
  const radius = Math.min(minRadius + (totalAgents * radiusPerAgent), maxRadius);

  // Even angular distribution
  const angleStep = (Math.PI * 2) / Math.max(totalAgents, 1);
  const angle = agentIndex * angleStep;

  // Calculate position
  const x = centerX + Math.cos(angle) * radius;
  const y = centerY + Math.sin(angle) * radius * 0.7;  // 0.7 for elliptical (perspective)

  return [x, y];
}

function getAgentPosition(id, W, H) {
  const now = Date.now();

  // Clean up expired position slots (keep them for 3 seconds after agent removal)
  for (const [agentId, expiry] of positionSlotTTL) {
    if (expiry < now && !positionAssignments.includes(agentId)) {
      positionSlotTTL.delete(agentId);
    }
  }

  // Get or assign position index
  if (!(id in agentPositions)) {
    // Check if we have a reserved slot for this agent (from recent removal)
    if (positionSlotTTL.has(id)) {
      // Find original index of this agent in positionAssignments
      const originalIndex = positionAssignments.indexOf(id);
      if (originalIndex !== -1) {
        // Restore original index
        agentPositions[id] = originalIndex;
      } else {
        // Fallback: not found in assignments, use next slot
        agentPositions[id] = positionAssignments.length;
        positionAssignments.push(id);
      }
    } else {
      // New agent gets next available slot
      agentPositions[id] = positionAssignments.length;
      positionAssignments.push(id);
    }
  }

  const index = agentPositions[id];
  const totalAgents = positionAssignments.length;
  return calculateRadialPos(index, totalAgents, W, H);
}

function removeAgentPosition(id) {
  if (id in agentPositions) {
    const removedIndex = agentPositions[id];

    // Mark slot as reserved for 3 seconds (allows re-add without position jump)
    positionSlotTTL.set(id, Date.now() + 3000);

    // Keep the slot in assignments (just mark as inactive) instead of removing
    // This prevents all other agents from shifting positions
    delete agentPositions[id];
  }
}

// Sprite state per agent (visual only)
class Sprite {
  constructor(x, y, hue, isSubagent = false) {
    this.x = x;
    this.y = y;
    this.tx = x;    // target x
    this.ty = y;    // target y
    this.vx = 0;    // velocity x for spring physics
    this.vy = 0;    // velocity y for spring physics
    this.repulsionX = 0;
    this.repulsionY = 0;
    this.hue = hue;
    this.isSubagent = isSubagent;
    this.phase = Math.random() * Math.PI * 2;  // pulse phase offset
    this.walkPhase = 0;
    this.bobAmount = 0;
    this.trail = [];  // last N positions for motion blur

    // Status transition (smooth morph between states)
    this.currentStatus = "idle";
    this.targetStatus = "idle";

    // Current visual values (interpolated each frame toward target)
    this.currentPulse = 0.4;
    this.currentRadius =22 * ZOOM;
    this.currentAlpha = 160;
    this.currentBobSpeed = 0.8;

    // Target values (from STATUS_CFG)
    this.targetPulse = 0.4;
    this.targetRadius = 22 * ZOOM;
    this.targetAlpha = 160;
    this.targetBobSpeed = 0.8;

    // Wandering / pacing behavior
    this.wanderOffset = { x: 0, y: 0 };
    this.wanderTarget = { x: 0, y: 0 };
    this.wanderTimer = 0;

    // Subagents orbit around parent
    this.orbitAngle = Math.random() * Math.PI * 2;
    this.orbitRadius = 65 * ZOOM;  // Default orbit radius (scaled)
    this.targetOrbitRadius = 65 * ZOOM;  // Target radius (closer when idle, farther when active)
    this.currentOrbitRadius = 65 * ZOOM;  // Smooth interpolated radius
    this.orbitSpeed = 0.3 + Math.random() * 0.3;

    // Fiddling animations
    this.fiddlePhase = Math.random() * Math.PI * 2;
    this.propAngle = 0;
    this.propScale = 1;

    // Blinking
    this.blinkTimer = Math.random() * 3;
    this.isBlinking = false;

    // Expression (for error state)
    this.expression = "normal";

    // Idle eye expression system
    this.idleEyeState = "closed";  // closed, halfLid, peek, glance
    this.idleEyeTimer = 2 + Math.random() * 3;
    this.idleGlanceDir = 0;  // -1 left, 0 center, 1 right

    // Code panel animation state
    this.editPanelPhase = "idle";  // idle, slideOut, expand, showCode, pixelate, closing
    this.editPanelStartTime = 0;
    this.editPanelDuration = 0;
    this.editPanelClosing = false;  // true when we need to finish closing animation
    this.editPanelCloseStart = 0;
    this.editPanelShowTime = null; // When panel started showing (for minimum duration)
    this.previousStatus = "idle";   // track previous status for transition detection
  }
}

function drawSpeechBubble(p, x, y, text, hue, alpha) {
  // Also check for empty or whitespace-only strings
  if (!text || !text.trim()) return;
  p.push();
  p.textSize(11);
  const tw = p.textWidth(text);
  const bw = tw + 18;
  const bh = 22;
  const bx = x - bw / 2;
  const by = y - 72;

  // bubble background
  p.noStroke();
  p.fill(10, 10, 20, alpha * 0.92);
  p.rect(bx, by, bw, bh, 6);

  // border
  p.stroke(p.color(`hsla(${hue}, 70%, 60%, ${alpha / 255})`));
  p.strokeWeight(1);
  p.noFill();
  p.rect(bx, by, bw, bh, 6);

  // tail
  p.noStroke();
  p.fill(10, 10, 20, alpha * 0.92);
  p.triangle(x - 5, by + bh, x + 5, by + bh, x, by + bh + 8);

  // text
  p.noStroke();
  p.fill(220, 220, 255, alpha);
  p.textAlign(p.CENTER, p.CENTER);
  p.text(text, x, by + bh / 2 + 1);
  p.pop();
}

// ── Subagent speech bubble (smaller) ─────────────────────────────────────

function drawSpeechBubbleSubagent(p, x, y, text, hue, alpha) {
  if (!text) return;
  p.push();
  p.textSize(9);
  const tw = p.textWidth(text);
  const bw = tw + 12;
  const bh = 16;
  const bx = x - bw / 2;
  const by = y - 45;

  // bubble background
  p.noStroke();
  p.fill(10, 10, 20, alpha * 0.92);
  p.rect(bx, by, bw, bh, 4);

  // border
  p.stroke(p.color(`hsla(${hue}, 70%, 60%, ${alpha / 255})`));
  p.strokeWeight(1);
  p.noFill();
  p.rect(bx, by, bw, bh, 4);

  // tail
  p.noStroke();
  p.fill(10, 10, 20, alpha * 0.92);
  p.triangle(x - 3, by + bh, x + 3, by + bh, x, by + bh + 5);

  // text
  p.noStroke();
  p.fill(220, 220, 255, alpha);
  p.textAlign(p.CENTER, p.CENTER);
  p.text(text, x, by + bh / 2 + 1);
  p.pop();
}

// ── Code Panel Animation (One Dark Theme) ─────────────────────────────────

// One Dark Theme colors
const ONE_DARK = {
  bg: [40, 44, 52],        // #282c34
  comment: [92, 99, 112],  // #5c6370
  string: [152, 195, 121], // #98c379 (green)
  number: [209, 154, 102], // #d19a66 (orange)
  keyword: [198, 120, 221],// #c678dd (purple)
  function: [97, 175, 239],// #61afef (blue)
  variable: [224, 108, 117],// #e06c75 (red/pink)
  operator: [212, 218, 226], // #d8dee9
};

// Fallback code snippets — programmer humor / infamous filenames
const FALLBACK_SNIPPETS = [
  'index.html',
  'GORILLA.BAS',
  'AUTOEXEC.BAT',
  'CONFIG.SYS',
  'file_id.diz',
  '.htaccess',
  'robots.txt',
  'favicon.ico',
  'Makefile',
  'INSTALL.TXT',
  'hello.c',
  'TODO.md',
  'LEFT-PAD.JS',
  'passwords.txt',
  '~/.vimrc',
  'wp-config.php',
];

function drawCodePanel(p, sp, r, now, alpha) {
  // Track how long we've been showing this panel (for minimum duration)
  if (!sp.editPanelShowTime) sp.editPanelShowTime = now;

  const panelShowDuration = now - sp.editPanelShowTime;
  const minShowTime = 1.0; // Minimum 1 second before allowing transition

  const panelAnimDuration = 2.5; // Total cycle duration
  const cycleTime = now % panelAnimDuration;
  // Check if we're in closing mode (status changed from editing)
  let panelAlpha = alpha;
  let drawPanel = true;
  let phase = 'showCode';
  let phaseProgress = 0.5;

  if (sp.editPanelClosing) {
    // We're in closing animation - pixelate/fade out
    const closeElapsed = now - sp.editPanelCloseStart;
    const closeDuration = 0.5;

    if (closeElapsed >= closeDuration) {
      // Closing complete
      sp.editPanelClosing = false;
      sp.editPanelShowTime = null; // Reset show time
      drawPanel = false;
    } else {
      // Continue closing animation
      phase = 'pixelate';
      phaseProgress = Math.min(closeElapsed / closeDuration, 1);
      panelAlpha = alpha * (1 - phaseProgress);
    }
  } else {
    // Normal cycle animation - determine phase from cycle time
    // BUT stay in showCode phase while editing, with minimum duration
    if (panelShowDuration < minShowTime) {
      // Must stay in showCode phase (or get there quickly)
      if (cycleTime < 0.4) {
        phase = 'slideOut';
        phaseProgress = Math.min(cycleTime / 0.4, 1);
        panelAlpha = alpha * phaseProgress;
      } else if (cycleTime < 0.6) {
        phase = 'expand';
        phaseProgress = Math.min((cycleTime - 0.4) / 0.2, 1);
        panelAlpha = alpha;
      } else {
        phase = 'showCode';
        phaseProgress = 1;
        panelAlpha = alpha;
      }
    } else {
      // After minimum time, can cycle normally
      // BUT stay in showCode phase instead of pixelating (only pixelate on close)
      if (cycleTime < 0.4) {
        phase = 'slideOut';
        phaseProgress = Math.min(cycleTime / 0.4, 1);
        panelAlpha = alpha * phaseProgress;
      } else if (cycleTime < 0.6) {
        phase = 'expand';
        phaseProgress = Math.min((cycleTime - 0.4) / 0.2, 1);
        panelAlpha = alpha;
      } else {
        phase = 'showCode';
        phaseProgress = 1;
        panelAlpha = alpha;
      }
    }
  }

  if (!drawPanel) return;

  // Calculate panel position and size - FURTHER LEFT (more offset)
  const baseX = sp.x - r * 4.2;  // Increased left offset (from 1.4 to 1.8)
  const baseY = sp.y - r * 0.3;

  // Slide animation (ease out)
  const easeOut = 1 - Math.pow(1 - phaseProgress, 3);
  let slideOffset = 0;
  if (phase === 'slideOut') {
    slideOffset = (1 - easeOut) * 40;
  } else if (phase === 'expand' || phase === 'showCode') {
    slideOffset = 0;
  } else {
    slideOffset = easeOut * 10;
  }

  const panelX = baseX + slideOffset;
  const panelY = baseY - 10;

  // Panel size - BIGGER
  let panelW = 80;
  let panelH = 45;

  if (phase === 'expand') {
    // Expand to full size
    const expandEase = easeOut;
    panelW = 80 + (120 - 80) * expandEase;
    panelH = 45 + (70 - 45) * expandEase;
  } else if (phase === 'showCode') {
    panelW = 120;
    panelH = 70;
  } else if (phase === 'pixelate') {
    // Shrink slightly during pixelation
    const shrink = 1 - phaseProgress * 0.3;
    panelW = 120 * shrink;
    panelH = 70 * shrink;
  }

  const panelLeft = panelX - panelW / 2;
  const panelTop = panelY - panelH / 2;

  // Draw panel background with rounded corners
  p.push();
  p.noStroke();
  p.fill(...ONE_DARK.bg, Math.floor(panelAlpha * 0.95));
  p.rect(panelLeft, panelTop, panelW, panelH, 4);

  // Panel border
  p.stroke(...ONE_DARK.string, Math.floor(panelAlpha * 0.6));
  p.strokeWeight(1);
  p.noFill();
  p.rect(panelLeft, panelTop, panelW, panelH, 4);

  // Draw code lines if in showCode or expand phase
  if ((phase === 'showCode' || phase === 'expand' || phase === 'pixelate') && panelAlpha > 10) {
    // Pick file name from agent's recent files, or fallback to generic list
    // Shuffle order per-sprite so each blob cycles through files differently
    const srcList = (sp.recentFiles && sp.recentFiles.length > 0) ? sp.recentFiles : FALLBACK_SNIPPETS;
    if (!sp._shuffledFiles || sp._shuffledSrc !== srcList || sp._shuffledLen !== srcList.length) {
      // (Re-)shuffle when source list changes
      sp._shuffledFiles = [...srcList];
      sp._shuffledSrc = srcList;
      sp._shuffledLen = srcList.length;
      // Fisher-Yates using sprite phase as seed for variety between blobs
      let seed = Math.abs(Math.round((sp.phase || 0) * 100000)) || 1;
      for (let i = sp._shuffledFiles.length - 1; i > 0; i--) {
        seed = (seed * 16807 + 0) % 2147483647; // LCG PRNG
        const j = seed % (i + 1);
        [sp._shuffledFiles[i], sp._shuffledFiles[j]] = [sp._shuffledFiles[j], sp._shuffledFiles[i]];
      }
    }
    const fileList = sp._shuffledFiles;
    const snippetIndex = Math.floor((now / panelAnimDuration) * fileList.length) % fileList.length;
    const snippet = fileList[snippetIndex];

    p.textSize(8);
    p.textAlign(p.LEFT, p.CENTER);

    // Draw code line - SINGLE COLOR (no syntax highlighting)
    let textX = panelLeft + 10;
    const textY = panelTop + panelH / 2;

    // Typewriter effect - reveal characters progressively
    const charProgress = Math.min(phaseProgress * 2, 1);
    const visibleChars = Math.floor(snippet.length * charProgress);
    const visibleText = snippet.substring(0, visibleChars);

    // Single color for all code (using function color - nice blue)
    p.fill(...ONE_DARK.function, Math.floor(panelAlpha * 0.95));
    p.text(visibleText, textX, textY);

    // Blinking cursor at end
    if (phase === 'showCode' && Math.sin(now * 6) > 0) {
      p.fill(...ONE_DARK.function, Math.floor(panelAlpha * 0.8));
      p.rect(textX + p.textWidth(visibleText) + 2, textY - 3, 2, 5, 0.5);
    }
  }

  // Pixelation effect during fade - MORE VISIBLE
  if (phase === 'pixelate' && phaseProgress > 0.1) {
    const pixelEffectProgress = (phaseProgress - 0.1) / 0.9;
    const pixelSize = 6 + pixelEffectProgress * 8;
    const pixelAlphaVal = (1 - pixelEffectProgress * 0.8) * panelAlpha;

    p.noStroke();
    // Break panel into random pixel squares - MORE EXPLOSIVE
    for (let px = 0; px < panelW; px += pixelSize) {
      for (let py = 0; py < panelH; py += pixelSize) {
        // Random offset for "exploding" effect - MORE DRAMATIC
        const offsetX = (Math.random() - 0.5) * pixelEffectProgress * 50;
        const offsetY = (Math.random() - 0.5) * pixelEffectProgress * 50 - pixelEffectProgress * 30;

        // Randomly skip some pixels for "breaking apart" effect
        if (Math.random() > 0.3) {
          p.fill(...ONE_DARK.bg, Math.floor(pixelAlphaVal * 0.6));
          p.rect(panelLeft + px + offsetX, panelTop + py + offsetY, pixelSize - 2, pixelSize - 2, 2);
        }
      }
    }
  }

  // Small pencil icon at corner (slides with panel)
  if (phase === 'slideOut' || phase === 'expand') {
    const pencilAlpha = phase === 'slideOut' ? panelAlpha * 0.5 : panelAlpha * 0.3;
    p.textSize(10);
    p.textAlign(p.CENTER, p.CENTER);
    p.fill(255, 255, 255, Math.floor(pencilAlpha));
    p.text("✏️", panelX, panelY - panelH / 2 - 8);
  }

  p.pop();
}

// ── Floor grid ─────────────────────────────────────────────────────────────

function drawFloor(p) {
  p.background(...FLOOR_COLOR);
  p.stroke(...GRID_COLOR);
  p.strokeWeight(1);
  for (let x = 0; x < p.width; x += GRID_SIZE) {
    p.line(x, 0, x, p.height);
  }
  for (let y = 0; y < p.height - 30; y += GRID_SIZE) {
    p.line(0, y, p.width, y);
  }
}

// ── Fiddling objects based on status ────────────────────────────────────────

function drawFiddlingObject(p, sp, status, r, now, alpha) {
  const fudge = Math.sin(now * 2 + sp.fiddlePhase);
  const fudge2 = Math.cos(now * 1.5 + sp.fiddlePhase * 1.3);
  const objX = sp.x + r * 1.4 + fudge * 5;
  const objY = sp.y + r * 0.3 + fudge2 * 3;
  p.push();
  p.textSize(14);
  p.textAlign(p.CENTER, p.CENTER);

  switch (status) {
    case "editing": {
      // Code panel animation
      drawCodePanel(p, sp, r, now, alpha);
      break;
    }
    case "reading": {
      // Book that opens/closes
      const bookOpen = 0.5 + 0.5 * Math.sin(now * 1.2);
      p.push();
      p.translate(objX, objY);
      p.scale(1, bookOpen > 0.5 ? 1 : -0.8);
      p.text("📖", 0, 0);
      p.pop();
      // Glasses
      p.push();
      p.translate(sp.x, sp.y - r * 0.6);
      const glassesWobble = Math.sin(now * 0.8) * 2;
      p.textSize(10);
      p.text(`👓`, glassesWobble, 0);
      p.pop();
      break;
    }
    case "running": {
      // Motion streaks
      p.noStroke();
      p.fill(255, 255, 255, alpha * 0.3);
      for (let i = 0; i < 3; i++) {
        const streakX = sp.x - r * 1.5 - i * 15 - Math.abs(fudge) * 5;
        const streakY = sp.y + fudge2 * 4;
        p.ellipse(streakX, streakY, 8 - i * 2, 3);
      }
      break;
    }
    case "thinking": {
      // Brain particles floating up
      for (let i = 0; i < 3; i++) {
        const particlePhase = (now * 0.8 + i * 0.7 + sp.fiddlePhase) % 3;
        const px = sp.x + Math.sin(now * 2 + i) * 20;
        const py = sp.y - r * (1 + particlePhase);
        const pAlpha = alpha * (1 - particlePhase / 3) * 0.5;
        p.textSize(8 + i * 2);
        p.fill(200, 180, 255, pAlpha);
        p.text("✨", px, py);
      }
      break;
    }
    case "idle": {
      // Occasional sparkles
      if (Math.sin(now * 0.5 + sp.fiddlePhase) > 0.85) {
        p.textSize(10);
        p.fill(255, 255, 200, alpha * 0.6);
        p.text("✨", objX + Math.sin(now * 3) * 8, objY - 10);
      }
      break;
    }
    case "waiting": {
      // Question mark that bounces
      p.textSize(14);
      p.fill(255, 220, 100, alpha * (0.6 + 0.4 * Math.sin(now * 3)));
      const qmBounce = Math.abs(Math.sin(now * 3)) * 8;
      p.text("❓", objX, objY - qmBounce);
      break;
    }
    case "error": {
      // Small warning signs
      p.textSize(12);
      p.fill(255, 100, 100, alpha * (0.5 + 0.3 * Math.sin(now * 5)));
      p.text("⚡", objX + fudge * 6, objY);
      break;
    }
  }
  p.pop();
}

// ── Update status transition ─────────────────────────────────────────────────

function updateStatusTransition(sp, newStatus, deltaTime = 1/60) {
  const cfg = STATUS_CFG[newStatus] || STATUS_CFG.idle;

  // If status changed, update target values
  if (sp.targetStatus !== newStatus) {
    sp.currentStatus = sp.targetStatus;
    sp.targetStatus = newStatus;
    sp.targetPulse = cfg.pulse;
    sp.targetRadius = cfg.radius;
    sp.targetAlpha = cfg.opacity;
    // Bob speed based on status
    if (newStatus === "idle") sp.targetBobSpeed = 0.8;
    else if (newStatus === "editing") sp.targetBobSpeed = 1.5; // Reduced from 3 to 1.5 - calmer breathing
    else if (newStatus === "running") sp.targetBobSpeed = 5;
    else sp.targetBobSpeed = 2;
  }

  // Use eased lerp for smoother, more gradual transitions
  // This creates a more natural "breathing" effect during status changes
  const lerpFactor = easeInOutCubic(deltaTime * 3);  // ~0.3 seconds for full transition

  sp.currentPulse += (sp.targetPulse - sp.currentPulse) * lerpFactor;
  sp.currentRadius += (sp.targetRadius - sp.currentRadius) * lerpFactor;
  sp.currentAlpha += (sp.targetAlpha - sp.currentAlpha) * lerpFactor;
  sp.currentBobSpeed += (sp.targetBobSpeed - sp.currentBobSpeed) * lerpFactor;
}

// ── Update wander/pacing ───────────────────────────────────────────────────

function updateWander(sp, now) {
  sp.wanderTimer -= 1/60;
  if (sp.wanderTimer <= 0) {
    // New wander target
    sp.wanderTimer = 3 + Math.random() * 5;
    sp.wanderTarget.x = (Math.random() - 0.5) * 60;
    sp.wanderTarget.y = (Math.random() - 0.5) * 30;
  }

  // Smoothly move toward wander target
  sp.wanderOffset.x += (sp.wanderTarget.x - sp.wanderOffset.x) * 0.02;
  sp.wanderOffset.y += (sp.wanderTarget.y - sp.wanderOffset.y) * 0.02;
}

// ── Update blinking ───────────────────────────────────────────────────────

function updateBlinking(sp, now) {
  sp.blinkTimer -= 1/60;
  if (sp.isBlinking && sp.blinkTimer <= 0) {
    // Blink finished → open eyes, schedule next blink
    sp.isBlinking = false;
    sp.blinkTimer = 2 + Math.random() * 4;  // Next blink in 2-6 seconds
  } else if (!sp.isBlinking && sp.blinkTimer <= 0) {
    // Time to blink → close eyes
    sp.isBlinking = true;
    sp.blinkTimer = 0.1;  // Blink duration
  }
}

function updateIdleEyes(sp, now, status, otherAgentsActive) {
  if (status !== "idle") {
    sp.idleEyeState = "open";
    return;
  }

  sp.idleEyeTimer -= 1/60;
  if (sp.idleEyeTimer <= 0) {
    // Pick next idle expression — mostly sleeping, rare eye-opens
    const roll = Math.random();
    if (otherAgentsActive && roll < 0.12) {
      // Curious peek when others are working
      sp.idleEyeState = "peek";
      sp.idleGlanceDir = Math.random() < 0.5 ? -1 : 1;
      sp.idleEyeTimer = 1 + Math.random() * 1.5;
    } else if (roll < 0.22) {
      // Half-lidded drowsy look
      sp.idleEyeState = "halfLid";
      sp.idleEyeTimer = 2 + Math.random() * 3;
    } else if (roll < 0.27) {
      // Brief glance around
      sp.idleEyeState = "glance";
      sp.idleGlanceDir = Math.random() < 0.5 ? -1 : 1;
      sp.idleEyeTimer = 0.6 + Math.random() * 1;
    } else {
      // Back to zen (closed eyes)
      sp.idleEyeState = "closed";
      sp.idleEyeTimer = 6 + Math.random() * 8;
    }
  }
}

function drawNameTag(p, x, y, folder, title, hue, status) {
  p.push();
  p.textSize(10);
  p.textAlign(p.CENTER, p.CENTER);

  // Calculate height based on whether title exists
  const hasTitle = title && title.trim();
  const folderTw = p.textWidth(folder);
  const titleTw = hasTitle ? p.textWidth(title) : 0;
  const tw = Math.max(folderTw, titleTw);

  const bw = tw + 14;
  const baseBh = 16;
  const titleBh = hasTitle ? 14 : 0;
  const bh = baseBh + titleBh;
  const bx = x - bw / 2;
  const by = y + 32;

  p.noStroke();
  p.fill(10, 10, 20, 200);
  p.rect(bx, by, bw, bh, 3);

  const hsl = `hsla(${hue}, 70%, 65%, 0.9)`;
  p.fill(p.color(hsl));
  p.text(folder, x, by + baseBh / 2 + 1);

  // Draw title below folder name (smaller, lighter)
  if (hasTitle) {
    p.fill(p.color(`hsla(${hue}, 50%, 55%, 0.8)`));
    p.textSize(8);
    p.text(title, x, by + baseBh + titleBh / 2);
  }

  // small status dot
  const dotColors = {
    idle:     [80, 80, 80],
    thinking: [180, 160, 255],
    editing:  [100, 255, 150],
    reading:  [100, 200, 255],
    running:  [255, 180, 80],
    waiting:  [255, 220, 60],
    error:    [255, 80, 80],
  };
  const dc = dotColors[status] || [120, 120, 120];
  p.fill(...dc, 230);
  p.ellipse(bx - 6, by + baseBh / 2, 5, 5);
  p.pop();
}

// ── Main p5 sketch ─────────────────────────────────────────────────────────

new p5((p) => {
  p.setup = () => {
    const cnv = p.createCanvas(p.windowWidth, p.windowHeight - 28);
    cnv.position(0, 0);
    cnv.style("z-index", "1");
    p.pixelDensity(window.devicePixelRatio || 1);
    p.textFont("monospace");
  };

  p.windowResized = () => {
    p.resizeCanvas(p.windowWidth, p.windowHeight - 28);
  };

  p.draw = () => {
    // Guard against undefined or inconsistent agent state
    if (!agents) {
      drawFloor(p);
      return;
    }

    drawFloor(p);

    const now = p.millis() / 1000;

    // Clean up agents that have finished fading out
    let agentsRemoved = false;
    for (const id in agents) {
      if (agents[id]._fadeOutStart && Date.now() - agents[id]._fadeOutStart > 1000) {
        delete agents[id];
        removeAgentPosition(id);
        agentsRemoved = true;
      }
    }

    // Update UI after fade-out cleanup (e.g. when disconnected and blobs finish fading)
    if (agentsRemoved) {
      const remaining = Object.values(agents);
      const mc = remaining.filter(a => !a.parentID).length;
      const sc = remaining.filter(a => a.parentID).length;
      let ct = mc === 0 ? "" : `${mc} agent${mc !== 1 ? "s" : ""}`;
      if (sc > 0) ct += ` + ${sc} subagent${sc !== 1 ? "s" : ""}`;
      agentCountEl.textContent = ct;
      noAgents.classList.toggle("hidden", remaining.length > 0);
    }

    const agentList = Object.values(agents);

    // Separate main agents from subagents
    const mainAgents = agentList.filter(agent => !agent.parentID);
    const subAgents = agentList.filter(agent => agent.parentID);

    // ── Initialize repulsion offsets for all agents ───────────────────────────
    for (const agent of mainAgents) {
      if (agent._sprite) {
        agent._sprite.repulsionX = 0;
        agent._sprite.repulsionY = 0;
      }
    }

    // ── Apply magnetic repulsion between all agent pairs ─────────────────────
    const agentsWithSprites = mainAgents
      .filter(a => a._sprite)
      .map(a => ({ agent: a, sprite: a._sprite }));

    for (let i = 0; i < agentsWithSprites.length; i++) {
      const a1 = agentsWithSprites[i];
      const r1 = a1.sprite.currentRadius;

      for (let j = i + 1; j < agentsWithSprites.length; j++) {
        const a2 = agentsWithSprites[j];
        const r2 = a2.sprite.currentRadius;

        // Distance between current positions
        const dx = a1.sprite.x - a2.sprite.x;
        const dy = a1.sprite.y - a2.sprite.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        // Minimum distance = sum of radii (with small buffer for natural overlap)
        const minDist = (r1 + r2) * 0.9;

        if (dist < minDist && dist > 0) {
          // Calculate repulsion based on overlap and sizes
          const overlap = minDist - dist;
          const combinedRadii = r1 + r2;

          // Scale repulsion by combined sizes (activityScale affects display radius)
          const scale1 = a1.agent.activityScale || 1.0;
          const scale2 = a2.agent.activityScale || 1.0;
          const sizeFactor = (scale1 + scale2) / 2;

          // Repulsion strength with inverse falloff
          const repulsionForce = (overlap / combinedRadii) * REPULSION_STRENGTH * sizeFactor;

          // Direction vector
          const nx = dx / dist;
          const ny = dy / dist;

          // Apply equal and opposite forces
          a1.sprite.repulsionX += nx * repulsionForce;
          a1.sprite.repulsionY += ny * repulsionForce;
          a2.sprite.repulsionX -= nx * repulsionForce;
          a2.sprite.repulsionY -= ny * repulsionForce;
        }
      }
    }

    // ── Draw main agents ───────────────────────────────────────────────────
    for (const agent of mainAgents) {
      try {
        // Calculate target position ONCE per frame (radial layout)
        let [targetX, targetY] = getAgentPosition(agent.id, p.width, p.height);

        // Activity scaling for chubby appearance
        const scale = agent.activityScale || 1.0;
        const widthBias = 1.2;

        // Ensure sprite exists
        if (!agent._sprite) {
          agent._sprite = new Sprite(targetX, targetY - 20, agent.color);
          // Initialize visual state from current status config
          const statusConfig = STATUS_CFG[agent.status] || STATUS_CFG.idle;
          agent._sprite.currentStatus = agent.status;
          agent._sprite.targetStatus = agent.status;
          agent._sprite.currentPulse = statusConfig.pulse;
          agent._sprite.currentRadius = statusConfig.radius;
          agent._sprite.currentAlpha = statusConfig.opacity;
          agent._sprite.targetPulse = statusConfig.pulse;
          agent._sprite.targetRadius = statusConfig.radius;
          agent._sprite.targetAlpha = statusConfig.opacity;
        }
        const sprite = agent._sprite;

        // Update status transition (smooth morph between states)
        updateStatusTransition(sprite, agent.status);

        // Sync recent files for code panel animation
        sprite.recentFiles = agent.recentFiles;

        // Update wandering/pacing behavior
        updateWander(sprite, now);

        // Update blinking
        updateBlinking(sprite, now);

        // Update idle eye expression
        const otherAgentsActive = mainAgents.some(other => other.id !== agent.id && other.status !== "idle");
        updateIdleEyes(sprite, now, agent.status, otherAgentsActive);

        // Move sprite toward target + wander offset (with spring physics)
        sprite.tx = targetX + sprite.wanderOffset.x;
        sprite.ty = targetY - 20 + sprite.wanderOffset.y;

        // Spring physics for natural, smooth movement
        // Higher stiffness = faster response, higher damping = less oscillation
        const stiffness = 0.03;
        const damping = 0.85;

        // Apply repulsion as an offset to the target position
        const repulsionX = Number.isFinite(sprite.repulsionX) ? sprite.repulsionX : 0;
        const repulsionY = Number.isFinite(sprite.repulsionY) ? sprite.repulsionY : 0;
        const effectiveTx = sprite.tx + repulsionX * 10;
        const effectiveTy = sprite.ty + repulsionY * 10;

        const dxPos = effectiveTx - sprite.x;
        const dyPos = effectiveTy - sprite.y;

        sprite.vx = sprite.vx * damping + dxPos * stiffness;
        sprite.vy = sprite.vy * damping + dyPos * stiffness;

        sprite.x += sprite.vx;
        sprite.y += sprite.vy;

        // Use smoothly interpolated visual values (no blending between configs)
        const pulse = Math.sin(now * sprite.currentPulse * Math.PI * 2 + sprite.phase);
        const radius = sprite.currentRadius + pulse * 3;

        // Fade-out alpha for departing agents
        let fadeAlpha = 1.0;
        if (agent._fadeOutStart) {
          const fadeProgress = (Date.now() - agent._fadeOutStart) / 1000;
          fadeAlpha = Math.max(0, 1.0 - fadeProgress);
        }
        const alpha = sprite.currentAlpha * fadeAlpha;

      // Status-specific effects
      const isError = agent.status === "error";
      const isWaiting = agent.status === "waiting";

      // Nervous shake for waiting state - gentle oscillation
      const shakeX = isWaiting ? Math.sin(now * 6) * 1.5 : 0;
      const shakeY = isWaiting ? Math.cos(now * 5) * 1 : 0;

      // Subtle vibration for error state - reduced frequency for elegance
      const vibrateX = isError ? Math.sin(now * 12) * 1 : 0;

      const drawX = sprite.x + shakeX + vibrateX;
      const drawY = sprite.y + shakeY;

      // Glow ring for active states
      const currentStatusConfig = STATUS_CFG[agent.status] || STATUS_CFG.idle;
      if (currentStatusConfig.ring) {
        p.noFill();
        p.strokeWeight(2);

        // Different ring styles based on status (smoothed)
        let ringPulse = now * 2.5;
        if (agent.status === "thinking") ringPulse = now * 1;  // Slow, expanding
        if (agent.status === "editing") ringPulse = now * 2;   // Calm (reduced from 4 to 2)
        if (agent.status === "waiting") ringPulse = now * 2;  // Moderate

        const glowAlpha = (0.3 + 0.2 * Math.sin(ringPulse + sprite.phase)) * alpha;
        p.stroke(p.color(`hsla(${agent.color}, 80%, 65%, ${glowAlpha / 255})`));
        p.ellipse(drawX, drawY, (radius + 10) * 2, (radius + 10) * 2);
        p.strokeWeight(1);
        p.stroke(p.color(`hsla(${agent.color}, 60%, 80%, ${glowAlpha * 0.5 / 255})`));
        p.ellipse(drawX, drawY, (radius + 18) * 2, (radius + 18) * 2);
      }

      // Bob / walk animation - use interpolated bob speed for smooth transitions
      // Map status to base amplitude for consistent motion
      let bobAmplitude = 2;
      if (agent.status === "editing") bobAmplitude = 1; // Reduced from 3 to 1 - less bouncing
      else if (agent.status === "running") bobAmplitude = 4;

      // Use interpolated bob speed for smooth transitions between states
      let bobY = Math.sin(now * sprite.currentBobSpeed + sprite.phase) * bobAmplitude;

      // Main blob body
      p.noStroke();
      // Shadow (affected by wander)
      p.fill(0, 0, 0, 60);
      p.ellipse(drawX + 2 + sprite.wanderOffset.x * 0.3, drawY + radius * 0.8 + 4, radius * 1.6 * scale * widthBias, radius * 0.5 * scale);

      // Body gradient simulation - add red tint for error state
      const bodyHue = isError ? (agent.color + 20) % 360 : agent.color;
      p.fill(p.color(`hsla(${bodyHue}, 70%, 35%, ${(alpha * 0.6) / 255})`));
      p.ellipse(drawX, drawY + bobY, radius * 2 * scale * widthBias, radius * 2 * scale);
      p.fill(p.color(`hsla(${bodyHue}, 80%, 60%, ${alpha / 255})`));
      p.ellipse(drawX - radius * 0.1, drawY + bobY - radius * 0.05, radius * 1.7 * scale * widthBias, radius * 1.7 * scale);

      // Red pulse for error
      if (isError) {
        p.fill(255, 80, 80, alpha * 0.15 * (0.5 + 0.5 * Math.sin(now * 5)));
        p.ellipse(drawX, drawY + bobY, radius * 2.2 * scale * widthBias, radius * 2.2 * scale);
      }

      // Highlight
      p.fill(p.color(`hsla(${bodyHue}, 60%, 90%, ${(alpha * 0.35) / 255})`));
      p.ellipse(drawX - radius * 0.25 * scale * widthBias, drawY + bobY - radius * 0.3, radius * 0.8 * scale * widthBias, radius * 0.6 * scale);

      // Eyes
      const eyeY = drawY + bobY - radius * 0.1;
      const eyeScaleX = scale * widthBias;
      const eyeScaleY = scale;

      // Determine eye state
      const eyeMode = sprite.isBlinking ? "blink"
        : (agent.status === "idle" ? sprite.idleEyeState : "open");

      if (eyeMode === "blink" || eyeMode === "closed") {
        // Closed eyes (horizontal lines) — zen meditation look
        p.stroke(10, 10, 30, alpha);
        p.strokeWeight(2);
        const eyeSpacing = radius * 0.35 * eyeScaleX;
        p.line(drawX - eyeSpacing, eyeY, drawX - eyeSpacing * 0.3, eyeY);
        p.line(drawX + eyeSpacing * 0.3, eyeY, drawX + eyeSpacing, eyeY);
        p.noStroke();
      } else if (eyeMode === "halfLid") {
        // Half-lidded drowsy eyes — smaller, sleepy
        p.fill(255, 255, 255, alpha * 0.7);
        const eyeWidth = 5 * eyeScaleX;
        const eyeHeight = 3 * eyeScaleY;  // Squished vertically
        const eyeXOffset = radius * 0.22 * eyeScaleX;
        p.ellipse(drawX - eyeXOffset, eyeY + 1, eyeWidth, eyeHeight);
        p.ellipse(drawX + eyeXOffset, eyeY + 1, eyeWidth, eyeHeight);
        // Tiny pupils looking down
        p.fill(10, 10, 30, alpha * 0.8);
        const pupilWidth = 2 * eyeScaleX;
        const pupilHeight = 2 * eyeScaleY;
        p.ellipse(drawX - eyeXOffset, eyeY + 1.5, pupilWidth, pupilHeight);
        p.ellipse(drawX + eyeXOffset, eyeY + 1.5, pupilWidth, pupilHeight);
        // Eyelid line on top
        p.stroke(10, 10, 30, alpha * 0.4);
        p.strokeWeight(1);
        p.line(drawX - eyeXOffset - 3, eyeY - 0.5, drawX - eyeXOffset + 3, eyeY);
        p.line(drawX + eyeXOffset - 3, eyeY, drawX + eyeXOffset + 3, eyeY - 0.5);
        p.noStroke();
      } else if (eyeMode === "peek" || eyeMode === "glance") {
        // Curious peek / glance — open eyes looking to one side
        p.fill(255, 255, 255, alpha * 0.9);
        const eyeWidth = 5 * eyeScaleX;
        const eyeHeight = (eyeMode === "peek" ? 4.5 : 6) * eyeScaleY;
        const eyeXOffset = radius * 0.22 * eyeScaleX;
        p.ellipse(drawX - eyeXOffset, eyeY, eyeWidth, eyeHeight);
        p.ellipse(drawX + eyeXOffset, eyeY, eyeWidth, eyeHeight);
        // Pupils shifted in glance direction
        const glanceShift = sprite.idleGlanceDir * 1.5 * eyeScaleX;
        p.fill(10, 10, 30, alpha);
        const pupilWidth = 2.5 * eyeScaleX;
        const pupilHeight = 3 * eyeScaleY;
        p.ellipse(drawX - eyeXOffset + glanceShift, eyeY, pupilWidth, pupilHeight);
        p.ellipse(drawX + eyeXOffset + glanceShift, eyeY, pupilWidth, pupilHeight);
      } else {
        // Normal open eyes (active states)
        p.fill(255, 255, 255, alpha * 0.9);
        const eyeWidth = 5 * eyeScaleX;
        const eyeHeight = 6 * eyeScaleY;
        const eyeXOffset = radius * 0.22 * eyeScaleX;
        p.ellipse(drawX - eyeXOffset, eyeY, eyeWidth, eyeHeight);
        p.ellipse(drawX + eyeXOffset, eyeY, eyeWidth, eyeHeight);

        // Pupils - status specific movement
        let pupilShift = 0;
        let pupilV = 1;

        if (agent.status === "thinking") {
          pupilShift = Math.sin(now * 3) * 1.5 * eyeScaleX;
          pupilV = 0;
        } else if (agent.status === "reading") {
          pupilShift = Math.sin(now * 0.5) * 0.5 * eyeScaleX;
          pupilV = 0.5;
        } else if (agent.status === "running") {
          pupilShift = Math.sin(now * 10) * 1 * eyeScaleX;
        } else if (agent.status === "waiting") {
          pupilShift = Math.sin(now * 2) * 1 * eyeScaleX;
        }

        const pupilWidth = 2.5 * eyeScaleX;
        const pupilHeight = 3 * eyeScaleY;
        p.fill(10, 10, 30, alpha);
        p.ellipse(drawX - eyeXOffset + pupilShift, eyeY + pupilV, pupilWidth, pupilHeight);
        p.ellipse(drawX + eyeXOffset + pupilShift, eyeY + pupilV, pupilWidth, pupilHeight);
      }

      // Error expression (X_X eyes) — overlay on top of whatever eye state
      if (isError) {
        const eyeXOffset = radius * 0.22 * eyeScaleX;
        p.stroke(10, 10, 30, alpha);
        p.strokeWeight(1.5);
        // X eyes
        const ex1 = drawX - eyeXOffset, ey1 = eyeY - 1;
        const ex2 = drawX + eyeXOffset, ey2 = eyeY - 1;
        const es = 2.5 * eyeScaleX;
        p.line(ex1 - es, ey1 - es, ex1 + es, ey1 + es);
        p.line(ex1 - es, ey1 + es, ex1 + es, ey1 - es);
        p.line(ex2 - es, ey2 - es, ex2 + es, ey2 + es);
        p.line(ex2 - es, ey2 + es, ex2 + es, ey2 - es);
        p.noStroke();
      }

      // Fiddling objects based on status
      // Check for status transition from editing → non-editing to trigger closing animation
      if (sprite.previousStatus === "editing" && agent.status !== "editing" && !sprite.editPanelClosing) {
        sprite.editPanelClosing = true;
        sprite.editPanelCloseStart = now;
      }
      sprite.previousStatus = agent.status;
      drawFiddlingObject(p, sprite, agent.status, sprite.currentRadius, now, alpha);

      // Speech bubble
      drawSpeechBubble(p, drawX, drawY + bobY, agent.message, agent.color, alpha);

      // Name tag
      drawNameTag(p, drawX, drawY, agent.folder, agent.title, agent.color, agent.status);
      } catch {
        // Skip this agent if rendering fails - prevents freeze on disconnect
      }
    }

    // ── Draw subagents (smaller, orbiting around parent) ────────────────────
    for (const subagent of subAgents) {
      try {
        // Find parent agent to orbit around
        const parent = agents[subagent.parentID];
        if (!parent || !parent._sprite) continue;

        const parentSprite = parent._sprite;
        // Use parent's CURRENT position for accurate orbit center
        // This ensures subagents orbit around where the parent actually is
        const orbitCenterX = parentSprite.x + parentSprite.wanderOffset.x;
        const orbitCenterY = parentSprite.y + parentSprite.wanderOffset.y;
        const isSubagent = true;
        const isIdle = subagent.status === "idle";

        // Subagent color is based on parent's hue + offset
        const subagentHue = (parent.color + 30) % 360;
        const saturation = 65;
        const lightness = 55;

        // Ensure sprite exists with subagent flag
        if (!subagent._sprite) {
          subagent._sprite = new Sprite(parentSprite.x, parentSprite.y, subagentHue, true);
          // Initialize visual state from current status config
          const statusConfig = STATUS_CFG[subagent.status] || STATUS_CFG.idle;
          subagent._sprite.currentStatus = subagent.status;
          subagent._sprite.targetStatus = subagent.status;
          subagent._sprite.currentPulse = statusConfig.pulse;
          subagent._sprite.currentRadius = statusConfig.radius * 0.6;  // 60% of main agent size
          subagent._sprite.currentAlpha = statusConfig.opacity;
          subagent._sprite.targetPulse = statusConfig.pulse;
          subagent._sprite.targetRadius = statusConfig.radius * 0.6;
          subagent._sprite.targetAlpha = statusConfig.opacity;
        }
        const sprite = subagent._sprite;
        sprite.isSubagent = true;

        // Update status transition
        updateStatusTransition(sprite, subagent.status);
        sprite.recentFiles = subagent.recentFiles;
        updateBlinking(sprite, now);
        updateIdleEyes(sprite, now, subagent.status, false);

        // Calculate fade out if agent is being removed
        let fadeAlpha = 1.0;
        if (subagent._fadeOutStart) {
          const fadeProgress = (Date.now() - subagent._fadeOutStart) / 1000;
          fadeAlpha = 1.0 - fadeProgress;
          if (fadeAlpha < 0) fadeAlpha = 0;
        }

        // Dynamic orbit radius based on status
        // Active subagents orbit farther out, idle ones drift closer to parent
        const isActiveStatus = ["thinking", "editing", "reading", "running", "waiting"].includes(subagent.status);
        const parentIsReading = parent.status === "reading";

        // Target orbit radius: closer when idle or when parent is reading from them
        const closeRadius = 45 * ZOOM;   // Close orbit (idle/parent reading)
        const farRadius = 90 * ZOOM;    // Far orbit (active)

        if (isIdle || parentIsReading) {
          sprite.targetOrbitRadius = closeRadius;
        } else if (isActiveStatus) {
          sprite.targetOrbitRadius = farRadius;
        }

        // Smooth interpolation toward target orbit radius
        sprite.currentOrbitRadius += (sprite.targetOrbitRadius - sprite.currentOrbitRadius) * 0.03;
        sprite.orbitRadius = sprite.currentOrbitRadius;

        // Update orbit position around parent
        sprite.orbitAngle += sprite.orbitSpeed * 0.5 * (1/60);  // Consistent speed
        const orbitOffsetX = Math.cos(sprite.orbitAngle) * sprite.orbitRadius;
        const orbitOffsetY = Math.sin(sprite.orbitAngle * 0.7) * sprite.orbitRadius * 0.4 + sprite.orbitRadius * 0.15;

        // Use interpolated visual values for smooth transitions
        const pulse = Math.sin(now * sprite.currentPulse + sprite.phase);
        const radius = sprite.currentRadius + pulse * 2;
        const alpha = sprite.currentAlpha * fadeAlpha;
        const bobY = Math.sin(now * sprite.currentBobSpeed * 0.5 + sprite.phase) * 2;

        // Calculate draw position using stable orbit center
        const drawX = orbitCenterX + orbitOffsetX;
        const drawY = orbitCenterY + orbitOffsetY + bobY;

        // Draw connecting line to parent (subtle)
        const lineAlpha = 30 * (alpha / 255);  // Scale with current alpha
        p.stroke(subagentHue, 60, 50, lineAlpha * fadeAlpha);
        p.strokeWeight(1);
        p.line(orbitCenterX, orbitCenterY - 10, drawX, drawY - radius);
        p.noStroke();

        // Shadow
        p.fill(0, 0, 0, 40 * fadeAlpha);
        p.ellipse(drawX + 1, drawY + radius * 0.6 + 2, radius * 1.4, radius * 0.4);

        // Body - rounded rectangle for subagents (different from main agents' ellipse)
        p.fill(p.color(`hsla(${subagentHue}, ${saturation}%, ${lightness - 15}%, ${(alpha * 0.7) / 255})`));
        p.rectMode(p.CENTER);
        p.rect(drawX, drawY, radius * 1.8, radius * 1.6, radius * 0.5);
        p.fill(p.color(`hsla(${subagentHue}, ${saturation + 5}%, ${lightness}%, ${alpha / 255})`));
        p.rect(drawX - radius * 0.1, drawY - radius * 0.1, radius * 1.5, radius * 1.3, radius * 0.4);
        p.rectMode(p.CORNER);

        // Highlight
        const highlightAlpha = 0.3 * (alpha / 255);
        p.fill(p.color(`hsla(${subagentHue}, 50%, 85%, ${highlightAlpha * fadeAlpha})`));
        p.ellipse(drawX - radius * 0.3, drawY - radius * 0.35, radius * 0.5, radius * 0.4);

        // Eyes - smaller for subagent
        const eyeY = drawY - radius * 0.1;
        const eyeSize = 3;
        const eyeAlpha = alpha;
        const subEyeMode = sprite.isBlinking ? "blink"
          : (subagent.status === "idle" ? sprite.idleEyeState : "open");
        if (subEyeMode === "blink" || subEyeMode === "closed") {
          p.stroke(10, 10, 30, eyeAlpha);
          p.strokeWeight(1.5);
          p.line(drawX - radius * 0.3, eyeY, drawX - radius * 0.1, eyeY);
          p.line(drawX + radius * 0.1, eyeY, drawX + radius * 0.3, eyeY);
          p.noStroke();
        } else if (subEyeMode === "halfLid") {
          p.fill(255, 255, 255, eyeAlpha * 0.7);
          p.ellipse(drawX - radius * 0.2, eyeY + 0.5, eyeSize + 1, eyeSize * 0.6);
          p.ellipse(drawX + radius * 0.2, eyeY + 0.5, eyeSize + 1, eyeSize * 0.6);
          p.fill(10, 10, 30, eyeAlpha * 0.8);
          p.ellipse(drawX - radius * 0.2, eyeY + 1, 2, 1.5);
          p.ellipse(drawX + radius * 0.2, eyeY + 1, 2, 1.5);
        } else if (subEyeMode === "peek" || subEyeMode === "glance") {
          p.fill(255, 255, 255, eyeAlpha * 0.9);
          p.ellipse(drawX - radius * 0.2, eyeY, eyeSize + 1, subEyeMode === "peek" ? eyeSize + 1 : eyeSize + 2);
          p.ellipse(drawX + radius * 0.2, eyeY, eyeSize + 1, subEyeMode === "peek" ? eyeSize + 1 : eyeSize + 2);
          const glanceShift = sprite.idleGlanceDir * 1;
          p.fill(10, 10, 30, eyeAlpha);
          p.ellipse(drawX - radius * 0.2 + glanceShift, eyeY, 2, 2.5);
          p.ellipse(drawX + radius * 0.2 + glanceShift, eyeY, 2, 2.5);
        } else {
          p.fill(255, 255, 255, eyeAlpha * 0.9);
          p.ellipse(drawX - radius * 0.2, eyeY, eyeSize + 1, eyeSize + 2);
          p.ellipse(drawX + radius * 0.2, eyeY, eyeSize + 1, eyeSize + 2);
          p.fill(10, 10, 30, eyeAlpha);
          p.ellipse(drawX - radius * 0.2, eyeY, 2, 2.5);
          p.ellipse(drawX + radius * 0.2, eyeY, 2, 2.5);
        }

        // Speech bubble (smaller for subagent)
        drawSpeechBubbleSubagent(p, drawX, drawY + bobY, subagent.message, subagentHue, alpha);
      } catch {
        // Skip this subagent if rendering fails - prevents freeze on disconnect
      }
    }

    // ── Empty office hint ──────────────────────────────────────────────────
    if (agentList.length === 0 && !connected) {
      p.push();
      p.fill(30, 30, 60, 200);
      p.noStroke();
      p.textSize(12);
      p.textAlign(p.CENTER);
      p.text("⚡ Waiting for plugin…", p.width / 2, p.height / 2 + 80);
      p.pop();
    }
  };
});
</script>
</body>
